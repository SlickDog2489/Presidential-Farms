<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(73, 97, 141);
        }
        h1{
            text-align: center;
            margin: 20px 0;
            color: #1a2e19;
            background: whitesmoke;
            padding: 10px 0;
            border-radius: 10px;
            box-shadow: 2px 2px 10px 1px rgb(60, 60, 60);
            border-bottom: 1px solid #1a2e19;
        }
        form{
            border-radius: 20px;
            background-color: grey;
            padding: 25px;
            width: 50%;
            justify-self: center;
            box-shadow: gray 2px 2px 10px 1px;
        }
        input[type=text], button, input[type=email], label, input[type=number], select, input[type=password]{
            display: block;
            border-radius: 10px;
            border: none;
            padding: 10px 15px 10px 15px;
            justify-self: center;
            width: 50%;
        }
        input[type=text], input[type=email], input[type=number], input[type=password] {
            font-size: 16px;
            margin: 6px 0;
            
        }
        button{
            background-color: cornflowerblue;
            justify-self: center;
            width: 100px;
            height: 30px;
        }
        select{
            border-radius: 5px;
            background-color: rgb(146, 177, 235);
            width: 50%;
            padding: 8px;
            margin: 6px 0;
            cursor: pointer;
        }
        button:hover{
            transition: background-color 0.5s;
            background-color: rgb(139, 168, 219);
        }
        label{
            color: aliceblue;
            text-shadow: 2px 2px 10px rgb(180, 178, 178);
        }
        input:focus{
            outline: none;
            background-color: rgb(200, 227, 250);
        }
        select:focus{
            outline: none;
            background-color: rgb(200, 227, 250);
        }
        a{
            color: white;
            text-decoration: none;
        }
        button{
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <form action="">
        <h1><i>Farm Form</i></h1>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
        <label for="phone">Phone</label>
        <input type="number" id="phone" placeholder="Enter your phone number">
        <label for="Password">Password</label>
        <input type="password" placeholder="Enter Password" minlength="8" maxlength="50">
        <button type="submit"><a href="/class/mini project/Farm/idex.html">Login</a></button>
    </form>
</body>
</html>
